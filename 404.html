<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Iframe Tester</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #fffaf0; /* clay-canvas */
        color: #3a3a3a; /* clay-body */
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        box-sizing: border-box;
      }
      .container {
        text-align: center;
        max-width: 480px;
        padding: 2rem;
        width: 100%;
      }
      .card {
        background-color: #f5f0e0; /* clay-surface-card */
        border: 1px solid #e5e5e5; /* clay-hairline */
        border-radius: 24px; /* clay-xl */
        padding: 3rem 2rem;
        box-shadow: 0 10px 30px rgba(10, 10, 10, 0.04);
        position: relative;
        overflow: hidden;
      }
      .mascot-container {
        width: 120px;
        height: 120px;
        margin: 0 auto 1.5rem;
        background-color: #faf5e8; /* clay-surface-soft */
        border: 1px solid #e5e5e5;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .mascot {
        width: 80%;
        height: 80%;
        object-fit: contain;
      }
      h1 {
        font-size: 2.25rem;
        font-weight: 700;
        color: #0a0a0a; /* clay-ink */
        margin: 0 0 0.5rem 0;
        letter-spacing: -0.03em;
      }
      .subtitle {
        font-size: 0.75rem;
        font-weight: 700;
        color: #ff4d8b; /* clay-pink */
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 1rem;
      }
      p {
        font-size: 0.95rem;
        line-height: 1.6;
        color: #3a3a3a;
        margin: 0 0 2rem 0;
      }
      .btn-container {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.875rem 1.5rem;
        font-weight: 600;
        font-size: 0.875rem;
        text-decoration: none;
        border-radius: 12px; /* clay-md */
        transition: all 0.2s ease;
      }
      .btn-primary {
        background-color: #0a0a0a; /* clay-primary */
        color: #ffffff;
      }
      .btn-primary:hover {
        background-color: #1f1f1f;
        transform: translateY(-1px);
      }
      .btn-secondary {
        background-color: transparent;
        color: #0a0a0a;
        border: 1px solid #e5e5e5;
      }
      .btn-secondary:hover {
        background-color: #faf5e8;
        transform: translateY(-1px);
      }
      .dots {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 6px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dot-1 { background-color: rgba(255, 77, 139, 0.3); }
      .dot-2 { background-color: rgba(255, 176, 132, 0.3); }
      .dot-3 { background-color: rgba(232, 185, 74, 0.3); }
    </style>

    <script type="text/javascript">
        if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            window.location.replace(window.location.href.replace('http:', 'https:'));
        } else {
            // Single Page Apps for GitHub Pages
            // MIT License
            // https://github.com/rafgraph/spa-github-pages
            // This script takes the current url and converts the path and query
            // string into just a query string, and then redirects the browser
            // to the new url with only a query string and hash fragment,
            // e.g. https://www.foo.tld/one/two?a=b&c=d#qwe becomes
            // https://www.foo.tld/?/one/two&a=b~and~c=d#qwe
            var pathSegmentsToKeep = 0;

            var l = window.location;
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
                l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="dots">
                <div class="dot dot-1"></div>
                <div class="dot dot-2"></div>
                <div class="dot dot-3"></div>
            </div>
            <div class="mascot-container">
                <img src="/mascot.webp" alt="Mascot Helper" class="mascot" />
            </div>
            <h1>404</h1>
            <div class="subtitle">Page Not Found</div>
            <p>The page you are looking for does not exist, has been moved, or is temporarily unavailable.</p>
            <div class="btn-container">
                <a href="/" class="btn btn-primary">Go to Iframe Tester</a>
                <a href="/guide" class="btn btn-secondary">Read Debugging Guide</a>
            </div>
        </div>
    </div>
</body>
</html>
